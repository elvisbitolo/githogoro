services:
  - type: web
    name: githogoro-connect
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx next build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: ADMIN_ACCESS_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NODE_ENV
        value: production
